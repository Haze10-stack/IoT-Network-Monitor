name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: omkarp-bit

jobs:
  # ── Lint & Test ─────────────────────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion-api, processing-service, backend-api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Lint
        run: npx eslint src --ext .js --max-warnings 0
        working-directory: services/${{ matrix.service }}
        continue-on-error: true

  # ── Build & Push Docker Images ─────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: ingestion-api
            context: services/ingestion-api
          - service: processing-service
            context: services/processing-service
          - service: backend-api
            context: services/backend-api
          - service: frontend
            context: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.ORG }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy & Smoke Test on Minikube ───────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ✅ Catch placeholder before anything runs
      - name: Validate no placeholder image names in manifests
        run: |
          if grep -r "YOUR_ORG" infra/k8s/; then
            echo "❌ ERROR: Placeholder YOUR_ORG still exists in manifests!"
            exit 1
          fi
          echo "✅ No placeholders found"

      # ✅ Force docker driver — most reliable on ubuntu-latest runners
      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          cpus: 2
          memory: 4096m
          driver: docker

      # ✅ Explicitly write kubeconfig to a known path and set KUBECONFIG env
      # Each `run:` step is a fresh shell — without this, kubectl falls back
      # to localhost:8080 and gets "connection refused"
      - name: Export kubeconfig for all steps
        run: |
          mkdir -p $HOME/.kube
          minikube kubectl -- config view --raw > $HOME/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      # ✅ Confirm cluster is reachable before doing anything else
      - name: Verify cluster is reachable
        run: |
          minikube status
          kubectl cluster-info
          kubectl get nodes

      # ✅ Authenticate so minikube can pull from GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Load images directly into minikube — no in-cluster pull needed
      - name: Load images into minikube
        run: |
          minikube image load ghcr.io/${{ env.ORG }}/ingestion-api:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/processing-service:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/backend-api:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/frontend:${{ github.sha }}

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Deploy all services
        run: |
          kubectl apply -f infra/k8s/ingestion-api/
          kubectl apply -f infra/k8s/processing-service/
          kubectl apply -f infra/k8s/backend-api/
          kubectl apply -f infra/k8s/frontend/

      # ✅ Use env.ORG — no hardcoded or placeholder values
      - name: Update image tags
        run: |
          kubectl set image deployment/ingestion-api \
            ingestion-api=ghcr.io/${{ env.ORG }}/ingestion-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/processing-service \
            processing-service=ghcr.io/${{ env.ORG }}/processing-service:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/backend-api \
            backend-api=ghcr.io/${{ env.ORG }}/backend-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/frontend \
            frontend=ghcr.io/${{ env.ORG }}/frontend:${{ github.sha }} \
            -n netmonitor

      # ✅ Force k8s to use locally loaded image, not re-pull from registry
      - name: Patch imagePullPolicy to IfNotPresent
        run: |
          for svc in ingestion-api processing-service backend-api frontend; do
            kubectl patch deployment $svc -n netmonitor \
              --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]' \
              || true
          done

      # ✅ Always runs — full debug info even when rollout fails
      - name: Debug pod state
        if: always()
        run: |
          echo "====== POD STATUS ======"
          kubectl get pods -n netmonitor -o wide
          echo "====== EVENTS ======"
          kubectl get events -n netmonitor --sort-by='.lastTimestamp' | tail -30
          echo "====== LOGS (last 50 lines per pod) ======"
          for pod in $(kubectl get pods -n netmonitor \
            -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs $pod -n netmonitor --tail=50 || true
          done

      # ✅ 180s gives pods enough time to become Ready
      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/ingestion-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/processing-service -n netmonitor --timeout=180s
          kubectl rollout status deployment/backend-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/frontend -n netmonitor --timeout=180s