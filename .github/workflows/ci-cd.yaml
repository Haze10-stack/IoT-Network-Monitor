name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: omkarp-bit

jobs:
  # ── Lint & Test ─────────────────────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion-api, processing-service, backend-api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Lint
        run: npx eslint src --ext .js --max-warnings 0
        working-directory: services/${{ matrix.service }}
        continue-on-error: true

  # ── Build & Push Docker Images ─────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: ingestion-api
            context: services/ingestion-api
          - service: processing-service
            context: services/processing-service
          - service: backend-api
            context: services/backend-api
          - service: frontend
            context: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/${{ matrix.service }}:latest
            ghcr.io/${{ env.ORG }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy & Smoke Test on Minikube ──────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ✅ Replace YOUR_ORG placeholder in manifests at CI time
      - name: Replace YOUR_ORG placeholder in manifests
        run: |
          find infra/k8s/ -type f \( -name "*.yml" -o -name "*.yaml" \) \
            -exec sed -i 's|ghcr.io/YOUR_ORG|ghcr.io/${{ env.ORG }}|g' {} +
          echo "✅ Updated image references:"
          grep -r "ghcr.io" infra/k8s/

      # ✅ Start minikube with docker driver
      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          cpus: 2
          memory: 4096m
          driver: docker

      - name: Fix kubeconfig context
        run: |
          minikube update-context
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Verify cluster is reachable
        run: |
          minikube status
          kubectl cluster-info
          kubectl get nodes

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      # ✅ Deploy Zookeeper and wait for it to be ready
      - name: Deploy Zookeeper
        run: |
          kubectl apply -n netmonitor -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: zookeeper
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: zookeeper
            template:
              metadata:
                labels:
                  app: zookeeper
              spec:
                containers:
                  - name: zookeeper
                    image: confluentinc/cp-zookeeper:7.4.0
                    ports:
                      - containerPort: 2181
                    env:
                      - name: ZOOKEEPER_CLIENT_PORT
                        value: "2181"
                      - name: ZOOKEEPER_TICK_TIME
                        value: "2000"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: zookeeper
          spec:
            selector:
              app: zookeeper
            ports:
              - port: 2181
                targetPort: 2181
          EOF
          kubectl rollout status deployment/zookeeper -n netmonitor --timeout=120s

      # ✅ Deploy Kafka and wait for it to be ready
      - name: Deploy Kafka
        run: |
          kubectl apply -n netmonitor -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kafka
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: kafka
            template:
              metadata:
                labels:
                  app: kafka
              spec:
                containers:
                  - name: kafka
                    image: confluentinc/cp-kafka:7.4.0
                    ports:
                      - containerPort: 9092
                    env:
                      - name: KAFKA_BROKER_ID
                        value: "1"
                      - name: KAFKA_ZOOKEEPER_CONNECT
                        value: "zookeeper:2181"
                      - name: KAFKA_ADVERTISED_LISTENERS
                        value: "PLAINTEXT://kafka:9092"
                      - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
                        value: "1"
                      - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
                        value: "true"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: kafka
          spec:
            selector:
              app: kafka
            ports:
              - port: 9092
                targetPort: 9092
          EOF
          kubectl rollout status deployment/kafka -n netmonitor --timeout=120s

      # ✅ Authenticate to GHCR on the runner
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ FIX: Pull images into runner's Docker daemon first,
      # THEN load into minikube — fixes ContainerCreating on fresh runners
      - name: Pull images from GHCR into runner
        run: |
          docker pull ghcr.io/${{ env.ORG }}/ingestion-api:${{ github.sha }}
          docker pull ghcr.io/${{ env.ORG }}/processing-service:${{ github.sha }}
          docker pull ghcr.io/${{ env.ORG }}/backend-api:${{ github.sha }}
          docker pull ghcr.io/${{ env.ORG }}/frontend:${{ github.sha }}

      - name: Load images into minikube
        run: |
          minikube image load ghcr.io/${{ env.ORG }}/ingestion-api:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/processing-service:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/backend-api:${{ github.sha }}
          minikube image load ghcr.io/${{ env.ORG }}/frontend:${{ github.sha }}
          echo "✅ Images loaded into minikube:"
          minikube image ls | grep ${{ env.ORG }}

      - name: Deploy all services
        run: |
          kubectl apply -f infra/k8s/ingestion-api/
          kubectl apply -f infra/k8s/processing-service/
          kubectl apply -f infra/k8s/backend-api/
          kubectl apply -f infra/k8s/frontend/

      - name: Update image tags
        run: |
          kubectl set image deployment/ingestion-api \
            ingestion-api=ghcr.io/${{ env.ORG }}/ingestion-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/processing-service \
            processing-service=ghcr.io/${{ env.ORG }}/processing-service:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/backend-api \
            backend-api=ghcr.io/${{ env.ORG }}/backend-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/frontend \
            frontend=ghcr.io/${{ env.ORG }}/frontend:${{ github.sha }} \
            -n netmonitor

      - name: Patch imagePullPolicy to IfNotPresent
        run: |
          for svc in ingestion-api processing-service backend-api frontend; do
            kubectl patch deployment $svc -n netmonitor \
              --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]' \
              || true
          done

      - name: Debug pod state
        if: always()
        run: |
          echo "====== POD STATUS ======"
          minikube kubectl -- get pods -n netmonitor -o wide || true
          echo "====== EVENTS ======"
          minikube kubectl -- get events -n netmonitor \
            --sort-by='.lastTimestamp' | tail -30 || true
          echo "====== LOGS (last 50 lines per pod) ======"
          for pod in $(minikube kubectl -- get pods -n netmonitor \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- $pod ---"
            minikube kubectl -- logs $pod -n netmonitor --tail=50 || true
          done

      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/ingestion-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/processing-service -n netmonitor --timeout=180s
          kubectl rollout status deployment/backend-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/frontend -n netmonitor --timeout=180s