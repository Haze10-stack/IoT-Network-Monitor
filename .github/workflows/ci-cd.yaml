name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Lint & Test ─────────────────────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion-api, processing-service, backend-api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      - name: Lint
        run: npx eslint src --ext .js --max-warnings 0
        working-directory: services/${{ matrix.service }}
        continue-on-error: true

  # ── Build & Push Docker Images ─────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: ingestion-api
            context: services/ingestion-api
          - service: processing-service
            context: services/processing-service
          - service: backend-api
            context: services/backend-api
          - service: frontend
            context: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/omkarp-bit/${{ matrix.service }}:latest
            ghcr.io/omkarp-bit/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy & Smoke Test on Minikube ───────────────────────────────────
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ✅ FIX 1: Start minikube with enough resources
      # Prevents pod scheduling failures due to insufficient CPU/memory
      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          cpus: 2
          memory: 4096m

      - name: Verify cluster is up
        run: kubectl get pods -A

      # ✅ FIX 2: Login to GHCR so minikube can pull images
      # Without this, image pull fails with "unauthorized"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ FIX 3: Load images directly into minikube's Docker daemon
      # Avoids re-pulling from GHCR and eliminates imagePullPolicy issues
      - name: Load images into minikube
        run: |
          minikube image load ghcr.io/omkarp-bit/ingestion-api:${{ github.sha }}
          minikube image load ghcr.io/omkarp-bit/processing-service:${{ github.sha }}
          minikube image load ghcr.io/omkarp-bit/backend-api:${{ github.sha }}
          minikube image load ghcr.io/omkarp-bit/frontend:${{ github.sha }}

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      # ✅ FIX 4: Patch imagePullPolicy to IfNotPresent
      # Uses the locally loaded image instead of trying to pull from registry
      - name: Patch imagePullPolicy for all deployments
        run: |
          for svc in ingestion-api processing-service backend-api frontend; do
            kubectl patch deployment $svc -n netmonitor \
              --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]' \
              || true
          done

      - name: Deploy all services
        run: |
          kubectl apply -f infra/k8s/ingestion-api/
          kubectl apply -f infra/k8s/processing-service/
          kubectl apply -f infra/k8s/backend-api/
          kubectl apply -f infra/k8s/frontend/

      - name: Update image tags
        run: |
          kubectl set image deployment/ingestion-api \
            ingestion-api=ghcr.io/omkarp-bit/ingestion-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/processing-service \
            processing-service=ghcr.io/omkarp-bit/processing-service:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/backend-api \
            backend-api=ghcr.io/omkarp-bit/backend-api:${{ github.sha }} \
            -n netmonitor
          kubectl set image deployment/frontend \
            frontend=ghcr.io/omkarp-bit/frontend:${{ github.sha }} \
            -n netmonitor

      # ✅ FIX 5: Debug step — runs before rollout check so you always
      # have pod state and logs if the next step fails
      - name: Debug pod state (runs even on failure)
        if: always()
        run: |
          echo "====== POD STATUS ======"
          kubectl get pods -n netmonitor -o wide
          echo "====== EVENTS ======"
          kubectl get events -n netmonitor --sort-by='.lastTimestamp' | tail -30
          echo "====== LOGS (last 50 lines per pod) ======"
          for pod in $(kubectl get pods -n netmonitor -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs $pod -n netmonitor --tail=50 || true
          done

      # ✅ FIX 6: Generous timeout + continues on error so debug step always runs
      - name: Verify rollouts
        run: |
          kubectl rollout status deployment/ingestion-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/processing-service -n netmonitor --timeout=180s
          kubectl rollout status deployment/backend-api -n netmonitor --timeout=180s
          kubectl rollout status deployment/frontend -n netmonitor --timeout=180s